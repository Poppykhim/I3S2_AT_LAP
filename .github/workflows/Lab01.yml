name: Lab 01 Automation

on:
  push:
    paths:
      - "Lab01/**"

jobs:
  test-lab01:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Compile and Run Tests
        # This is the "Magic Line" that fixes your error
        working-directory: ./Lab01
        run: |
          mkdir -p bin
          javac -d bin -cp "lib/*:src" src/lab01/*.java test/lab01/*.java
          java -jar lib/junit-platform-console-standalone-1.13.0-M3.jar --class-path bin --scan-class-path
