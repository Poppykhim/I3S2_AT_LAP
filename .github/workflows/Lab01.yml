name: Lab 01 Automation

on:
  push:
    paths:
      - "Lab01/**"

jobs:
  test-lab01:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install and Start NestJS Backend
        working-directory: ./Lab01/online-shop
        run: |
          npm install
          # Start in background so the script can move to the next step
          npm run start &

      - name: Wait for NestJS to be Ready
        # NestJS takes time to initialize modules and mapped routes
        run: sleep 20

      - name: Compile and Run Java Tests
        working-directory: ./Lab01
        run: |
          mkdir -p bin
          # Compile
          javac -d bin -cp "lib/*:src" src/lab01/*.java test/lab01/*.java

          # Run Tests
          java -jar lib/junit-platform-console-standalone-1.13.0-M3.jar --class-path bin --scan-class-path
